<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Prisma Studio</title>
    <link rel="icon" href="./favicon.svg" />
    <link rel="stylesheet" href="./index.css">
    <style>
      /* Tvinga vit bakgrund och dölj ALLT annat under laddning */
      body, html { background: #ffffff !important; margin: 0; padding: 0; overflow: hidden; }
      
      /* Förhindra att Prismas inbyggda logo flashar förbi */
      #prisma-studio-splash, [class*="splash"], [id*="splash"] { 
        display: none !important; 
        visibility: hidden !important; 
      }
    </style>
  </head>

    <div id="root"></div>
    <script type="module" src="./http/splash.js"></script>
  </body>
