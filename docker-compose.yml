services:
  db:
    image: postgres:16-alpine
    container_name: ambmail-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ambmail}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ambmailpassword}
      POSTGRES_DB: ${POSTGRES_DB:-ambmail_db}
    volumes:
      - ambmail_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - ambmail_net

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ambmail-app
    restart: unless-stopped
    user: "1000:1000"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3000:3000"
    networks:
      - ambmail_net
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-ambmail}:${POSTGRES_PASSWORD:-ambmailpassword}@db:5432/${POSTGRES_DB:-ambmail_db}?schema=public
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-dev-only-change-me-32-chars-minimum}
      ENCRYPTION_KEY_FILE: ${ENCRYPTION_KEY_FILE:-.ambmail.key}
      BASIC_AUTH_USER: ${BASIC_AUTH_USER:-ambmail}
      BASIC_AUTH_PASSWORD: ${BASIC_AUTH_PASSWORD:-ambmail-dev-password}
      ADMIN_PANEL_SECRET: ${ADMIN_PANEL_SECRET:-change-this-admin-secret}
      ADMIN_PANEL_PATH: ${ADMIN_PANEL_PATH:-ostmedsmorochskinka999}
      AMBMAIL_PUBLIC_URL: ${AMBMAIL_PUBLIC_URL:-http://localhost:3000}
      NC_BASE_URL: ${NC_BASE_URL:-http://localhost:8084}
      NC_PUBLIC_URL: ${NC_PUBLIC_URL:-http://localhost:8084}
      NC_OAUTH_DATA_PATH: ${NC_OAUTH_DATA_PATH:-}
      NC_OAUTH_RUNTIME_PATH: ${NC_OAUTH_RUNTIME_PATH:-.nextcloud-oauth.json}
      NC_OAUTH_CLIENT_ID: ${NC_OAUTH_CLIENT_ID:-}
      NC_OAUTH_CLIENT_SECRET: ${NC_OAUTH_CLIENT_SECRET:-}
      NCAUTH_URL: ${NCAUTH_URL:-}
      SHARED_SIGNING_SECRET: ${SHARED_SIGNING_SECRET:-}
      SYNC_WORKER_INTERVAL_MS: ${SYNC_WORKER_INTERVAL_MS:-300000}
      SYNC_FETCH_LIMIT: ${SYNC_FETCH_LIMIT:-}

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ambmail-worker
    restart: unless-stopped
    user: "1000:1000"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    depends_on:
      db:
        condition: service_healthy
    networks:
      - ambmail_net
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-ambmail}:${POSTGRES_PASSWORD:-ambmailpassword}@db:5432/${POSTGRES_DB:-ambmail_db}?schema=public
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-dev-only-change-me-32-chars-minimum}
      ENCRYPTION_KEY_FILE: ${ENCRYPTION_KEY_FILE:-.ambmail.key}
      BASIC_AUTH_USER: ${BASIC_AUTH_USER:-ambmail}
      BASIC_AUTH_PASSWORD: ${BASIC_AUTH_PASSWORD:-ambmail-dev-password}
      ADMIN_PANEL_SECRET: ${ADMIN_PANEL_SECRET:-change-this-admin-secret}
      ADMIN_PANEL_PATH: ${ADMIN_PANEL_PATH:-ostmedsmorochskinka999}
      AMBMAIL_PUBLIC_URL: ${AMBMAIL_PUBLIC_URL:-http://localhost:3000}
      NC_BASE_URL: ${NC_BASE_URL:-http://localhost:8084}
      NC_PUBLIC_URL: ${NC_PUBLIC_URL:-http://localhost:8084}
      NC_OAUTH_DATA_PATH: ${NC_OAUTH_DATA_PATH:-}
      NC_OAUTH_RUNTIME_PATH: ${NC_OAUTH_RUNTIME_PATH:-.nextcloud-oauth.json}
      NC_OAUTH_CLIENT_ID: ${NC_OAUTH_CLIENT_ID:-}
      NC_OAUTH_CLIENT_SECRET: ${NC_OAUTH_CLIENT_SECRET:-}
      NCAUTH_URL: ${NCAUTH_URL:-}
      SHARED_SIGNING_SECRET: ${SHARED_SIGNING_SECRET:-}
      SYNC_WORKER_INTERVAL_MS: ${SYNC_WORKER_INTERVAL_MS:-300000}
      SYNC_FETCH_LIMIT: ${SYNC_FETCH_LIMIT:-}
    command: ["npx", "ts-node", "--compiler-options", "{\"module\":\"CommonJS\"}", "scripts/sync-worker.ts"]

volumes:
  ambmail_db_data:

networks:
  ambmail_net:
    name: ambmail_net
    driver: bridge
