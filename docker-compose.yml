services:
  db:
    image: mariadb:11
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: nextcloud
      MARIADB_USER: nextcloud
      MARIADB_PASSWORD: ${NC_PASSWORD:-changeme}
      MARIADB_ROOT_PASSWORD: ${NC_ROOT_PASSWORD:-rootchangeme}
    volumes:
      - db:/var/lib/mysql

  nextcloud:
    image: nextcloud:29-apache
    restart: unless-stopped
    ports:
      - "8083:80"
    environment:
      MYSQL_DATABASE: nextcloud
      MYSQL_USER: nextcloud
      MYSQL_PASSWORD: ${NC_PASSWORD:-changeme}
      MYSQL_HOST: db
      NEXTCLOUD_ADMIN_USER: ${NC_ADMIN_USER:-admin}
      NEXTCLOUD_ADMIN_PASSWORD: ${NC_PASSWORD:-changeme}
      NEXTCLOUD_TRUSTED_DOMAINS: ${NC_TRUSTED_DOMAINS:-localhost}
    volumes:
      - nextcloud:/var/www/html
    depends_on:
      - db

  nextcloud-init:
    image: nextcloud:29-apache
    depends_on:
      - nextcloud
    environment:
      NC_PASSWORD: ${NC_PASSWORD:-changeme}
      NC_USERS: ${NC_USERS:-user1 user2}
    volumes:
      - nextcloud:/var/www/html
    entrypoint: ["/bin/sh"]
    command:
      - -c
      - |
          set -e
          echo 'Waiting for Nextcloud to be installed...'
          until [ -f /var/www/html/config/config.php ]; do sleep 2; done
          until su -s /bin/sh www-data -c "php /var/www/html/occ status" | grep -q 'installed: true'; do sleep 2; done
          for u in $${NC_USERS}; do
            if ! su -s /bin/sh www-data -c "php /var/www/html/occ user:info \"$${u}\"" >/dev/null 2>&1; then
              echo "Creating user $${u}"
              su -s /bin/sh www-data -c "OC_PASS=\"$${NC_PASSWORD}\" php /var/www/html/occ user:add --password-from-env --display-name=\"$${u}\" \"$${u}\""
            else
              echo "User $${u} already exists"
            fi
          done
          echo 'Done.'

volumes:
  db:
  nextcloud:
